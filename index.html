<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Mini Battle</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden; background: #14181f;
    font-family: Tahoma, sans-serif; color: #fff; touch-action: none;
    height: 100%;
  }
  #canvas { display: block; background: #1c2330; }
  #hud {
    position: fixed; top: 10px; left: 10px; right: 10px;
    display: flex; justify-content: space-between; pointer-events: none;
    font-size: 14px;
  }
  #hpBar { width: 120px; height: 14px; background: #333; border-radius: 7px; overflow: hidden; }
  #hpFill { height: 100%; background: #4caf50; width: 100%; transition: width .15s; }
  #status { position: fixed; top: 45%; left: 50%; transform: translate(-50%,-50%);
    text-align: center; font-size: 20px; background: rgba(0,0,0,.6); padding: 16px 24px; border-radius: 12px; display: none; }
  #joyBase { position: fixed; bottom: 30px; left: 30px; width: 110px; height: 110px;
    border-radius: 50%; background: rgba(255,255,255,.12); border: 2px solid rgba(255,255,255,.3); }
  #joyStick { position: absolute; width: 46px; height: 46px; border-radius: 50%;
    background: rgba(255,255,255,.5); top: 32px; left: 32px; }
  #shootBtn { position: fixed; bottom: 45px; right: 40px; width: 84px; height: 84px;
    border-radius: 50%; background: rgba(255,60,60,.7); border: 2px solid rgba(255,255,255,.4);
    color: #fff; font-size: 14px; }
  #nameOverlay { position: fixed; inset: 0; background: #14181f; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; z-index: 10; }
  #nameOverlay input { padding: 10px 14px; border-radius: 8px; border: none; font-size: 16px; width: 220px; text-align: center; }
  #nameOverlay button { padding: 10px 24px; border-radius: 8px; border: none; font-size: 16px;
    background: #4caf50; color: #fff; }
</style>
</head>
<body>

<div id="nameOverlay">
  <div style="font-size:22px;">🎮 Mini Battle</div>
  <input id="nameInput" maxlength="20" placeholder="اسمت رو بنویس" />
  <button id="joinBtn">ورود به بازی</button>
</div>

<canvas id="canvas"></canvas>

<div id="hud">
  <div id="hpBar"><div id="hpFill"></div></div>
  <div id="aliveCount"></div>
</div>

<div id="status"></div>

<div id="joyBase"><div id="joyStick"></div></div>
<button id="shootBtn">شلیک</button>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
</body>
</html>
